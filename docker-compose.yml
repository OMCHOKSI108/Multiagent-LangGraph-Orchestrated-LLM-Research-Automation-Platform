services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-research_platform}
      POSTGRES_USER: ${DB_USER:-research}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-research_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [app_net]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [app_net]

  ai_engine:
    build:
      context: ./ai_engine
    environment:
      PORT: 8000
      LLM_STATUS: ${LLM_STATUS:-HUGGINGFACE}

      # Networking fix
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      REDIS_URL: redis://redis:6379/0
      AI_ENGINE_SECRET: ${AI_ENGINE_SECRET}

      # ===== HUGGINGFACE MODELS =====
      MODEL_HF_REASONING: ${MODEL_HF_REASONING:-microsoft/phi-3-medium-4k-instruct}
      MODEL_HF_WRITING: ${MODEL_HF_WRITING:-microsoft/phi-3-medium-4k-instruct}
      MODEL_HF_CODING: ${MODEL_HF_CODING:-Qwen/Qwen2.5-Coder-7B-Instruct}
      HUGGINGFACE_DEVICE: ${HUGGINGFACE_DEVICE:-auto}
      HUGGINGFACE_QUANTIZATION: ${HUGGINGFACE_QUANTIZATION:-true}

      # ===== LOCAL MODELS (Fallback) =====
      MODEL_LOCAL_REASONING: ${MODEL_LOCAL_REASONING:-mistral:7b-instruct}
      MODEL_LOCAL_WRITING: ${MODEL_LOCAL_WRITING:-gemma2:2b}
      MODEL_LOCAL_CODING: ${MODEL_LOCAL_CODING:-qwen2.5-coder:latest}

      # ===== ONLINE MODELS =====
      MODEL_ONLINE_REASONING: ${MODEL_ONLINE_REASONING:-openrouter/anthropic/claude-3.5-sonnet}
      MODEL_ONLINE_WRITING: ${MODEL_ONLINE_WRITING:-openrouter/openai/gpt-4o-mini}
      MODEL_ONLINE_CODING: ${MODEL_ONLINE_CODING:-openrouter/deepseek/deepseek-coder}

      # API KEYS (Multi-key support)
      OPENROUTER_API_1: ${OPENROUTER_API_1:-}
      OPENROUTER_API_2: ${OPENROUTER_API_2:-}
      OPENROUTER_API_3: ${OPENROUTER_API_3:-}
      GROQ_API_1: ${GROQ_API_1:-}
      GROQ_API_2: ${GROQ_API_2:-}
      GROQ_API_3: ${GROQ_API_3:-}
      GEMINI_API_1: ${GEMINI_API_1:-}
      GEMINI_API_2: ${GEMINI_API_2:-}
      GEMINI_API_3: ${GEMINI_API_3:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}

      MAX_TOKENS: ${MAX_TOKENS:-4096}
      AI_ENGINE_MAX_WORKERS: ${AI_ENGINE_MAX_WORKERS:-4}

    ports:
      - "8000:8000"

    volumes:
      - ./ai_engine:/app/ai_engine
      - ai_output:/output
      - ai_logs:/app/ai_engine/logs
      - ai_cache:/app/ai_engine/cache
      - research_images:/shared/research_images
    working_dir: /app/ai_engine
    command: ["sh", "-c", "cd /app/ai_engine && PYTHONPATH=/app/ai_engine:/app python -m uvicorn main:app --host 0.0.0.0 --port 8000"]

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
    networks: [app_net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 5000

      AI_ENGINE_URL: http://ai_engine:8000
      AI_ENGINE_SECRET: ${AI_ENGINE_SECRET}

      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-research_platform}
      DB_USER: ${DB_USER:-research}
      DB_PASSWORD: ${DB_PASSWORD:-research_password}

      REDIS_URL: redis://redis:6379/0

      # SECURITY
      JWT_SECRET: ${JWT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}

      # PERFORMANCE
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY:-4}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-1800000}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - research_images:/shared/research_images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai_engine:
        condition: service_healthy
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

    restart: unless-stopped
    networks: [app_net]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      AI_ENGINE_URL: http://ai_engine:8000
      AI_ENGINE_SECRET: ${AI_ENGINE_SECRET}
      REDIS_URL: redis://redis:6379/0

      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-research_platform}
      DB_USER: ${DB_USER:-research}
      DB_PASSWORD: ${DB_PASSWORD:-research_password}

      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-1800000}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai_engine:
        condition: service_healthy

    restart: unless-stopped
    networks: [app_net]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001/api}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001/api}

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

    restart: unless-stopped
    networks: [app_net]

volumes:
  postgres_data:
  redis_data:
  ai_output:
  ai_logs:
  ai_cache:
  research_images:

networks:
  app_net:
    driver: bridge
