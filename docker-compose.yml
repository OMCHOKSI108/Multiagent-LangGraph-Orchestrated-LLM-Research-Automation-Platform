name: deep-research-platform

# ─────────────────────────────────────────────────────────────────────────────
# Multiagent Research Automation Platform — full stack
#   postgres  →  pgvector-enabled PostgreSQL 16
#   redis     →  BullMQ job queue backing store
#   fastapi   →  LangGraph research engine        (port 8000)
#   node      →  GraphQL auth / queue / SSE API   (port 4000)
#   client    →  Next.js frontend                 (port 3000)
# Env vars are loaded from ./.env  (copy .env.example → .env first)
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: drp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kuchi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kuchi_password}
      POSTGRES_DB: ${POSTGRES_DB:-kuchi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kuchi_user} -d ${POSTGRES_DB:-kuchi_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - drp-net

  redis:
    image: redis:7-alpine
    container_name: drp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - drp-net

  fastapi:
    build:
      context: ./server/fastapi_server
      dockerfile: Dockerfile
    container_name: drp-fastapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - drp-net

  node:
    build:
      context: ./server/ts_server
      dockerfile: Dockerfile
    container_name: drp-node
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "4000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FASTAPI_URL: http://fastapi:8000
      APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "${NODE_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - drp-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Baked into the browser bundle at build time — must be host-reachable URLs
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:4000/graphql}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: drp-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - drp-net

volumes:
  postgres_data:
  redis_data:

networks:
  drp-net:
    driver: bridge
