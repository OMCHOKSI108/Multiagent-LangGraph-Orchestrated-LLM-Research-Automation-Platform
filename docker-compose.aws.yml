version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-research_platform}
      POSTGRES_USER: ${POSTGRES_USER:-avnadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AVNS_kitWuvmp7Q-98DTnqOh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app_net

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - app_net

  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      AI_ENGINE_SECRET: ${AI_ENGINE_SECRET:-change_this_to_a_secure_random_string}
      LLM_STATUS: ONLINE
      BACKEND_URL: http://backend:5000
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgres://${POSTGRES_USER:-avnadmin}:${POSTGRES_PASSWORD:-AVNS_kitWuvmp7Q-98DTnqOh}@postgres:5432/${POSTGRES_DB:-research_platform}
      MODEL_REASONING: ${MODEL_REASONING:-openrouter/anthropic/claude-3.5-sonnet:beta}
      MODEL_WRITING: ${MODEL_WRITING:-groq/gemma2-9b-it}
      MODEL_CODING: ${MODEL_CODING:-groq/qwen-2.5-coder-32b}
      MODEL_CRITICAL: ${MODEL_CRITICAL:-gemini/gemini-2.0-flash}
      OPENROUTER_API_1: ${OPENROUTER_API_1:-}
      GROQ_API_1: ${GROQ_API_1:-}
      GEMINI_API_1: ${GEMINI_API_1:-}
    depends_on:
      - postgres
      - redis
      - ollama
    restart: unless-stopped
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 5000
      AI_ENGINE_URL: http://ai_engine:8000
      AI_ENGINE_SECRET: ${AI_ENGINE_SECRET:-change_this_to_a_secure_random_string}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-research_platform}
      DB_USER: ${POSTGRES_USER:-avnadmin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-AVNS_kitWuvmp7Q-98DTnqOh}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
      - ai_engine
    restart: unless-stopped
    networks:
      - app_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      AI_ENGINE_URL: http://ai_engine:8000
      AI_ENGINE_SECRET: ${AI_ENGINE_SECRET:-change_this_to_a_secure_random_string}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-research_platform}
      DB_USER: ${POSTGRES_USER:-avnadmin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-AVNS_kitWuvmp7Q-98DTnqOh}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - ai_engine
    restart: unless-stopped
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  app_net:
    driver: bridge
